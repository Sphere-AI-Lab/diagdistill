output_folder: videos/long
inference_iter: -1
num_output_frames: 1200
use_ema: false
seed: 0
num_samples: 1
save_with_index: true
global_sink: true
context_noise: 0
taehv_checkpoint_path: /home/liujinxiu/new_self-forcing/checkpoints/taew2_1.pth
